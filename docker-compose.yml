version: '3.8'

services:
  ubuntu-ssh:
    image: ubuntu:22.04
    container_name: ubuntu-ssh
    privileged: true
    ports:
      - "2122:22"
    volumes:
      - /:/host
    environment:
      - DEBIAN_FRONTEND=noninteractive
    stdin_open: true
    tty: true
    command: >
      bash -c "apt-get update && apt-get install -y curl &&
               curl -sSf https://sshx.io/get | sh -s run"